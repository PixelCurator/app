name: PixelCurator
options:
  bundleIdPrefix: yves.vogl
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 6T5T32GRR3
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  PixelCurator:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - PixelCurator
    scheme:
      testTargets:
        - PixelCuratorTests
        - PixelCuratorUITests
      # UnitTests is the default plan → Xcode Cloud runs only the stable unit
      # tests. AllTests (incl. the iOS UI test) is for local/manual full runs.
      testPlans:
        - path: TestPlans/UnitTests.xctestplan
          defaultPlan: true
        - path: TestPlans/AllTests.xctestplan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: yves.vogl.pixelcurator
        PRODUCT_NAME: PixelCurator
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: PixelCurator/PixelCurator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Apple requires this Info.plist key when icons live in an asset
        # catalog (iOS 11+). Without it, the upload fails ITMS-90713 and
        # Apple falls back to looking for legacy 120x120 / 152x152 PNGs
        # outside the catalog (ITMS-90022 / 90023).
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        # iPad multitasking requires explicit orientation declaration
        # (ITMS-90474). Allow all four — the photo grid + sort + albums
        # views all reflow cleanly across rotations.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        # Photo library usage strings (written into the generated Info.plist)
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PixelCurator reads your photo library to suggest album assignments on-device."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "PixelCurator adds photos to existing albums or creates new ones when you confirm."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        # macOS window behaviour
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Yves Vogl"
        # Export compliance: app uses only exempt (Apple/OS-provided) encryption,
        # so uploads skip the manual encryption question in App Store Connect.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO

  PixelCuratorTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - PixelCuratorTests
    dependencies:
      - target: PixelCurator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: yves.vogl.pixelcurator.tests
        GENERATE_INFOPLIST_FILE: YES
        # xcodegen emits a single TEST_HOST that uses the iOS bundle layout
        # (App.app/Exe), which breaks on macOS where the executable lives at
        # App.app/Contents/MacOS/Exe. The macOS Test action in Xcode Cloud
        # consequently fails with "Could not find test host" before any test
        # runs. Override per-SDK using the [sdk=macosx*] condition; iOS keeps
        # the default xcodegen path so we don't change it explicitly.
        "TEST_HOST[sdk=macosx*]": $(BUILT_PRODUCTS_DIR)/PixelCurator.app/Contents/MacOS/PixelCurator
        "BUNDLE_LOADER[sdk=macosx*]": $(BUILT_PRODUCTS_DIR)/PixelCurator.app/Contents/MacOS/PixelCurator

  PixelCuratorUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - PixelCuratorUITests
    dependencies:
      - target: PixelCurator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: yves.vogl.pixelcurator.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PixelCurator
