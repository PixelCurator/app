name: PixelCurator
options:
  bundleIdPrefix: live.kadenz
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 6T5T32GRR3
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  PixelCurator:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - PixelCurator
    scheme:
      testTargets:
        - PixelCuratorTests
        - PixelCuratorUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.kadenz.pixelcurator
        PRODUCT_NAME: PixelCurator
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: PixelCurator/PixelCurator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        # Photo library usage strings (written into the generated Info.plist)
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PixelCurator reads your photo library to suggest album assignments on-device."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "PixelCurator organizes photos into albums you confirm."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        # macOS window behaviour
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Yves Vogl"

  PixelCuratorTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - PixelCuratorTests
    dependencies:
      - target: PixelCurator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.kadenz.pixelcurator.tests
        GENERATE_INFOPLIST_FILE: YES

  PixelCuratorUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - PixelCuratorUITests
    dependencies:
      - target: PixelCurator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.kadenz.pixelcurator.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PixelCurator
