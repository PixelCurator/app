# Smart hybrid fallback for Xcode Cloud's "CI - Pull Requests" workflow.
#
# Why this exists: Apple's Xcode Cloud free tier has a 25h/month compute
# quota. When exhausted, every PR build silently CANCELs (cancelReason=null,
# startedDate=null). The repo is private + free GitHub plan = no branch
# protection, so PRs become unverified.
#
# How the guard works:
#   1. On PR / push to main, the `quota-check` job hits ASC API and looks at
#      the 5 most recent runs of Xcode Cloud workflow 2a53972c (the PR
#      workflow). If 3+ of them are CANCELED-without-reason or FAILED before
#      start, Xcode Cloud is treated as quota-out.
#   2. `test` job runs ONLY when quota-check reports quota-out. Saves
#      ~200 effective GHA macOS minutes per PR when Xcode Cloud is healthy.
#
# Manual override: `gh workflow run pr-fallback-ci.yml --ref <branch>` still
# forces a run regardless of guard state.
name: PR CI (smart hybrid)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / SHA / tag to test (default: triggering ref)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  quota-check:
    name: Detect Xcode Cloud quota state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      quota_out: ${{ steps.detect.outputs.quota_out }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Resolve quota state from ASC API
        id: detect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Always run on manual dispatch; the guard only applies to auto triggers.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — bypassing guard"
            echo "quota_out=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${ASC_KEY_ID:-}" ] || [ -z "${ASC_ISSUER_ID:-}" ] || [ -z "${ASC_PRIVATE_KEY:-}" ]; then
            echo "ASC secrets missing — assuming Xcode Cloud is quota-out to be safe"
            echo "quota_out=true" >> "$GITHUB_OUTPUT"
            echo "reason=secrets-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Mint ASC JWT inline (pure Python, no PyJWT install required).
          # Uses ES256 signing over /tmp/asc.p8.
          umask 077
          printf '%s' "$ASC_PRIVATE_KEY" > /tmp/asc.p8
          python3 - <<'PY' > /tmp/jwt.txt
          import os, json, time, base64, hashlib, hmac
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec, utils

          def b64u(b):
              return base64.urlsafe_b64encode(b).rstrip(b'=').decode()

          key_id = os.environ['ASC_KEY_ID']
          iss = os.environ['ASC_ISSUER_ID']
          with open('/tmp/asc.p8','rb') as f:
              key = serialization.load_pem_private_key(f.read(), password=None)

          header = {"alg":"ES256","kid":key_id,"typ":"JWT"}
          payload = {"iss":iss,"exp":int(time.time())+600,"aud":"appstoreconnect-v1"}
          signing_input = (b64u(json.dumps(header).encode()) + '.' + b64u(json.dumps(payload).encode())).encode()

          der = key.sign(signing_input, ec.ECDSA(hashes.SHA256()))
          r,s = utils.decode_dss_signature(der)
          sig = r.to_bytes(32,'big') + s.to_bytes(32,'big')
          print(signing_input.decode() + '.' + b64u(sig))
          PY
          JWT=$(cat /tmp/jwt.txt)
          rm /tmp/asc.p8 /tmp/jwt.txt

          # PR workflow id is constant for this app.
          PR_WORKFLOW="2a53972c-ff8a-43ff-80a3-20de7bd7cdef"
          curl -sS -G "https://api.appstoreconnect.apple.com/v1/ciWorkflows/$PR_WORKFLOW/buildRuns" \
            -H "Authorization: Bearer $JWT" \
            --data-urlencode "limit=10" > /tmp/resp.json

          BAD=$(python3 - <<'PY'
          import json
          d = json.load(open('/tmp/resp.json'))
          runs = []
          for r in d.get('data', []):
              a = r['attributes']
              runs.append((a.get('createdDate',''), a.get('completionStatus'), a.get('cancelReason'), a.get('startedDate')))
          runs.sort(reverse=True)
          bad = 0
          for _, status, reason, started in runs[:5]:
              if status == 'CANCELED' and reason is None and started is None:
                  bad += 1
          print(bad)
          PY
          )
          echo "Recent quota-out signatures: $BAD of last 5 runs"
          if [ "$BAD" -ge 3 ]; then
            echo "Xcode Cloud appears quota-out — running fallback tests"
            echo "quota_out=true" >> "$GITHUB_OUTPUT"
            echo "reason=xcode-cloud-quota-out" >> "$GITHUB_OUTPUT"
          else
            echo "Xcode Cloud appears healthy — skipping fallback tests"
            echo "quota_out=false" >> "$GITHUB_OUTPUT"
            echo "reason=xcode-cloud-healthy" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: xcodebuild test (UnitTests plan, iOS Simulator)
    needs: quota-check
    if: needs.quota-check.outputs.quota_out == 'true'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Show why this job is running
        run: echo "Reason: ${{ needs.quota-check.outputs.reason }}"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Pick a stable iOS simulator
        id: sim
        run: |
          DESTINATION="platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | head -40

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project PixelCurator.xcodeproj \
            -scheme PixelCurator \
            -destination "${{ steps.sim.outputs.destination }}" \
            -testPlan UnitTests \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UnitTests plan
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project PixelCurator.xcodeproj \
            -scheme PixelCurator \
            -destination "${{ steps.sim.outputs.destination }}" \
            -testPlan UnitTests \
            -resultBundlePath build/UnitTests.xcresult

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: UnitTests-xcresult
          path: build/UnitTests.xcresult
          if-no-files-found: warn
          retention-days: 7
